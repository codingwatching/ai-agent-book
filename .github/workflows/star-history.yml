name: Update star history chart

on:
  schedule:
    # Weekly, Mondays at 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install matplotlib

      - name: Generate star history chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/gen_star_history.py "${{ github.repository }}" assets/star-history.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain assets/star-history.svg)" ]]; then
            git add assets/star-history.svg
            git commit -m "chore: 自动更新 star history 图表"
            git push
          else
            echo "No change in star history chart."
          fi
